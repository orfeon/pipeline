sources:
  - title: bigquery
    description: Reads data from Google BigQuery via SQL query or table direct read. Supports Standard SQL with query result caching, Storage Read API for direct table access with field/row filtering, view mode for periodic polling, and microbatch mode for near real-time streaming.
    tags: [source, bigquery, batch, gcp, sql]
  - title: bigtable
    description: Reads rows from Google Cloud Bigtable. Supports row key range and prefix filtering, column family/qualifier filters, and cell value deserialization.
    tags: [source, bigtable, batch, gcp, nosql, wide-column]
  - title: create
    description: Generates data directly from configuration without external data sources. Supports listing explicit elements or generating sequences from a range specification.
    tags: [source, create, batch, streaming, generate, test, dummy]
  - title: datastore
    description: Reads entities from Google Cloud Datastore using GQL queries. Supports namespace filtering, query splitting for parallel reads, and optional entity key extraction.
    tags: [source, datastore, batch, gcp, nosql, entity, gql]
  - title: drive
    description: Retrieves file metadata and content from Google Drive. Supports searching files by query, specifying file IDs directly, reading Google Sheets content, and exporting Google Workspace files to various formats.
    tags: [source, drive, batch, google, sheets, docs, workspace]
  - title: files
    description: Lists file metadata by matching glob patterns on Cloud Storage, S3, or local file systems. Optionally reads file content as bytes. Useful for file inventory, metadata-driven pipelines, and file content ingestion.
    tags: [source, files, batch, gcs, s3, metadata, glob]
  - title: firestore
    description: Reads documents from Google Cloud Firestore. Supports collection queries with field filters, field projection, ordering, parallel partition queries, and subcollection traversal via allDescendants.
    tags: [source, firestore, batch, gcp, nosql, document]
  - title: http
    description: Sends HTTP requests and outputs the responses. Supports GET/POST/PUT/DELETE methods, FreeMarker template expressions for endpoint/params/headers/body, loop-based pagination, request chaining with input dependencies, response format handling (text/json/xml/bytes), backoff/retry configuration, and rate limiting.
    tags: [source, http, batch, api, rest]
  - title: jdbc
    description: Reads data from relational databases via JDBC queries. Supports MySQL, PostgreSQL and other JDBC-compatible databases with parallel reads over split queries.
    tags: [source, jdbc, batch, database, sql, mysql, postgresql]
  - title: postgres
    description: .
    tags: [source, postgres, batch]
  - title: pubsub
    description: Reads messages from Google Cloud Pub/Sub topics or subscriptions. Supports JSON, Avro, Protocol Buffers, and raw message formats. Includes attribute-based filtering, partition routing with inline filter/select/flatten, additional metadata field injection, seek-based replay, and multi-partition output.
    tags: [source, pubsub, streaming, gcp, messaging]
  - title: spanner
    description: Reads data from Google Cloud Spanner via SQL query or table scan. Supports batch partitioned queries, table key range filtering, change streams for CDC, view mode for periodic polling, microbatch mode for near real-time streaming, Data Boost, and timestamp-bound reads.
    tags: [source, spanner, batch, streaming, gcp, sql, cdc]
  - title: storage
    description: Reads and parses file contents from Google Cloud Storage (GCS), AWS S3, or local file systems. Supports Avro, Parquet, CSV, and JSON formats with schema auto-inference for binary formats. Includes column projection for Parquet, header skipping and line filtering for CSV, and compression support for text formats.
    tags: [source, storage, batch, gcs, s3, avro, parquet, csv, json]
  - title: tidb
    description: .
    tags: [source, postgres, batch]
transforms:
  - title: aggregation
    description: Performs aggregation processing on multiple inputs with grouping, filtering, and field selection. Supports 12 aggregation functions (count, sum, avg, max, min, last, first, arg_max, arg_min, std, simple_regression, array_agg) with per-record conditions, expression-based fields, weighted calculations, and configurable output limiting. Works consistently in both batch and streaming modes.
    tags: [transform, aggregation, batch, streaming, groupby]
  - title: beamsql
    description: Processes and combines input data using SQL queries based on Apache Beam SQL (Calcite). Supports JOIN across multiple inputs, aggregation with windowing, built-in UDFs/UDAFs, and inline lookup joins against external sources (JDBC / Spanner / Bigtable / REST) registered via the sources parameter.
    tags: [transform, beamsql, batch, streaming, sql, join, aggregation, lookup, jdbc, spanner, bigtable, rest]
  - title: partition
    description: Splits input data into multiple named outputs based on filter conditions. Each partition can have its own filter and optional select processing. Supports exclusive routing (first match only) or non-exclusive routing (multiple matches). Unmatched records are routed to an excluded output. Optionally merges all partitions into a single union output.
    tags: [transform, partition, filter, routing, batch, streaming]
  - title: query
    description: Runs Calcite SQL over each input element inside a DoFn, without any shuffle. Array-of-struct fields can be expanded with UNNEST/LATERAL so aggregation, ORDER BY/LIMIT and set operations (UNION/INTERSECT/EXCEPT) run over the per-element collection. External tables (JDBC / Spanner / Bigtable / Datastore / Firestore / REST) can be joined on their keys as batched lookup-joins that never scan the external table - point, key-prefix or bounded-range fetches, and correlated LATERAL blocks whose aggregation/ORDER BY/LIMIT run over each key's fetched rows inside the DoFn. Spanner sources also expose parameterized GoogleSQL/GQL statements as key-driven query tables (Spanner Graph traversals, full-text SEARCH, arbitrary parameterized queries). A buffer source exposes the transform's own past input elements, accumulated per group key in Beam state, as a lookup table - per-key history, sequence detection and funnels with no external store; its insertSql defines the buffered rows by SQL, and insertOutput/restoreSql/dedupFields keep an external copy and rebuild state from it after a pipeline restart (state as a cache over the external store). Multiple named queries can run per element in one session - later queries reference earlier results as tables, each output query becomes a named module output, and exclusive mode routes each element to its first matching output. One element yields zero or more output rows (fan-out or fold), and windowing/timestamps are preserved so batch and streaming behave identically.
    tags: [transform, query, batch, streaming, sql, calcite, unnest, lateral, lookup, join, jdbc, spanner, bigtable, datastore, firestore, rest, graph, search, buffer, state, history, cep, routing, multi-output]
  - title: reshuffle
    description: Redistributes elements across workers to prevent fusion and enable checkpointing. Useful for balancing load after a fan-out step or before an expensive operation.
    tags: [transform, reshuffle, batch, streaming, fusion, checkpoint]
  - title: select
    description: Filters rows and transforms field values. Supports 27 select functions (pass, cast, rename, constant, replace, expression, text, concat, nullif, uuid, hash, event_timestamp, current_timestamp, struct, json, json_path, http, scrape, generate, bytes_encode, bytes_decode, base64_encode, base64_decode, reshape, tokenize_encode, tokenize_decode, lag) with implicit function detection, FreeMarker templates, mathematical expressions, nested structs, and stateful windowed operations. Works in both batch and streaming modes.
    tags: [transform, select, filter, batch, streaming, field, projection]
sinks:
  - title: auxia
    description: Sends input data as events to the Auxia platform via its ingestion API.
    tags: [sink, auxia, batch, streaming, event, api]
  - title: bigquery
    description: Writes input data to Google BigQuery tables. Supports multiple write methods (FILE_LOADS, STREAMING_INSERTS, STORAGE_WRITE_API, STORAGE_API_AT_LEAST_ONCE), dynamic destination tables via FreeMarker templates, time partitioning, clustering, primary key, schema update options, auto-sharding, KMS encryption, and failure handling.
    tags: [sink, bigquery, batch, streaming, gcp, sql]
  - title: bigtable
    description: Writes, updates, or deletes cells and rows in Google Cloud Bigtable. Supports flexible row key generation with FreeMarker templates, multiple column families and qualifiers, per-record dynamic mutation operations, cell timestamp control, flow control, and batching.
    tags: [sink, bigtable, batch, streaming, gcp, nosql, wide-column]
  - title: datastore
    description: Writes or deletes entities in Google Cloud Datastore. Supports flexible key generation from fields, templates, or auto-generated UUIDs, and can exclude fields from indexing.
    tags: [sink, datastore, batch, streaming, gcp, nosql, entity]
  - title: debug
    description: Outputs input data to logs for debugging and inspection. Each record is logged as JSON with window and pane metadata. In DirectRunner mode, results are written as Avro files to a work directory.
    tags: [sink, debug, batch, streaming, log, test]
  - title: files
    description: Writes each input record as an individual file to Cloud Storage (GCS) or local file system. The output path and content are dynamically determined per record using FreeMarker template expressions.
    tags: [sink, files, batch, streaming, gcs, storage, write, export]
  - title: firestore
    description: Writes or deletes documents in Google Cloud Firestore. Supports flexible document name generation from fields, templates, or auto-generated UUIDs. Includes RPC QoS tuning for write throughput control.
    tags: [sink, firestore, batch, streaming, gcp, nosql, document]
  - title: jdbc
    description: Writes data to relational databases via JDBC statements. Supports MySQL, PostgreSQL and other JDBC-compatible databases with batching and configurable write operations.
    tags: [sink, jdbc, batch, streaming, database, sql, mysql, postgresql]
  - title: pubsub
    description: Publishes input data as messages to Google Cloud Pub/Sub topics. Supports JSON, Avro, and Protocol Buffers serialization formats. Includes dynamic topic routing via FreeMarker templates, custom message attributes with template expressions, message ID and ordering key control, batch size tuning, and passthrough of PubsubMessage inputs.
    tags: [sink, pubsub, batch, streaming, gcp, messaging]
  - title: spanner
    description: Writes input data to Google Cloud Spanner tables using mutations. Supports INSERT, UPDATE, INSERT_OR_UPDATE, REPLACE, and DELETE operations. Includes commit timestamp injection, batch tuning parameters, RPC priority control, max commit delay, failure handling with dead-letter output, and emulator support.
    tags: [sink, spanner, batch, streaming, gcp, sql]
  - title: storage
    description: Writes input data as files to Cloud Storage (GCS), S3, or local file system in Avro, Parquet, Arrow IPC, JSON, or CSV format. Supports dynamic output paths using FreeMarker templates, sharding, compression, and codec configuration.
    tags: [sink, storage, batch, streaming, gcs, s3, avro, parquet, arrow, csv, json]
