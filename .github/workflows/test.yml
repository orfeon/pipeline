name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        run: mvn --batch-mode test

      - name: Coverage summary
        if: always()
        run: |
          CSV=target/site/jacoco/jacoco.csv
          if [ -f "$CSV" ]; then
            {
              echo "## Coverage (line)"
              echo ""
              echo "| Scope | Covered | Total | % |"
              echo "| --- | ---: | ---: | ---: |"
              awk -F',' 'NR>1 && $2 ~ /^com\.mercari/ {
                m+=$8; c+=$9
                if ($2 ~ /^com\.mercari\.solution\.module/) { mm+=$8; mc+=$9 }
                if ($2 ~ /^com\.mercari\.solution\.util\.schema/) { sm+=$8; sc+=$9 }
              }
              END {
                printf "| module | %d | %d | %.1f%% |\n", mc, mc+mm, 100*mc/(mc+mm)
                printf "| util.schema | %d | %d | %.1f%% |\n", sc, sc+sm, 100*sc/(sc+sm)
                printf "| total | %d | %d | %.1f%% |\n", c, c+m, 100*c/(c+m)
              }' "$CSV"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14
